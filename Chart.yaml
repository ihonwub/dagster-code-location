# =============================================================================
# REPO B  --  dagster-code-location  (the tenant WRAPPER chart)
# -----------------------------------------------------------------------------
# This chart deploys ONE Dagster code location (one team's gRPC code-server pod)
# by wrapping Dagster's OFFICIAL `dagster-user-deployments` chart and adding a
# per-location NetworkPolicy.
#
# WHO USES IT: the tenant ApplicationSet in Repo A
# (apps/dagster-code-locations/applicationset.yaml) installs this chart once per
# team, passing each team's values built from
# apps/dagster-workspace/locations/<team>.yaml.
#
# WHY IT EXISTS:
#   - Pin + test the official chart version in ONE place.
#   - Bundle the per-location NetworkPolicy so it travels WITH the deployment
#     (same Argo App that creates the namespace -> no ordering race).
#
# HOW REPO A CONSUMES IT: Argo CD pulls this chart straight from this git repo
# (the ApplicationSet source points at the repo + path "."). No OCI/ECR publish
# step is needed -- the dagster-user-deployments subchart is fetched at render
# time from the repository pinned below, so charts/ and Chart.lock are NOT
# committed (see .gitignore).
# =============================================================================
apiVersion: v2
name: dagster-code-location
description: >-
  Wrapper around the official dagster-user-deployments chart that deploys one
  Dagster code location plus its NetworkPolicy. Consumed by the tenant
  ApplicationSet in the dagster-release repo (Repo A).
type: application
version: 0.1.0

dependencies:
  - name: dagster-user-deployments
    version: "1.13.10" # PIN to your tested version
    repository: https://dagster-io.github.io/helm
